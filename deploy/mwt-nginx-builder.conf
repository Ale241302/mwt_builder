# /opt/mwt/nginx/builder.conf
#
# Server block para mwt-nginx (stack /opt/mwt) que enruta el dominio del
# builder al container mwt-builder-nginx, expuesto en 127.0.0.1:8080.
#
# El TLS lo termina Cloudflare (proxy on / orange cloud + SSL flexible).
# Si en el futuro se mete certbot al stack mwt, agregar el bloque :443.

server {
    listen 80;
    listen [::]:80;
    # Coincide con el dominio del builder. Doble forma por si Cloudflare
    # respeta el host original o lo reescribe.
    server_name builder.muito.work;

    client_max_body_size 50m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;

    # mwt-nginx llega al host vía host.docker.internal (requiere extra_hosts
    # con host-gateway en el docker-compose del stack mwt).
    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
