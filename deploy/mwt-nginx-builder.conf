# /opt/mwt/nginx/conf.d/builder.muito.work.conf
#
# Reverse proxy del stack maestro `mwt-nginx` (corre dentro de un container)
# hacia el builder, que publica su nginx en 127.0.0.1:8080 del HOST.
#
# Como `mwt-nginx` es un container, "127.0.0.1" desde su POV es el container,
# NO el host. Hay que llegarle al host. Tres opciones (elegir UNA):
#
#   A) host.docker.internal — requiere `extra_hosts` en /opt/mwt/docker-compose.yml:
#         extra_hosts:
#           - "host.docker.internal:host-gateway"
#      Luego usar:  proxy_pass http://host.docker.internal:8080;   (RECOMENDADO)
#
#   B) Conectar mwt-nginx a la red del builder y usar nombre de servicio:
#         docker network connect mwt_builder_mwt_builder_network mwt-nginx
#      Luego usar:  proxy_pass http://mwt-builder-nginx:80;
#      (Requiere que el bind 127.0.0.1:8080:80 ya no sea necesario.)
#
#   C) IP fija del bridge default (frágil, evitar):
#         proxy_pass http://172.17.0.1:8080;
#
# Por defecto este archivo asume la opción A.

# --- HTTP: ACME challenge + redirect a HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name builder.muito.work;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: termina TLS y hace proxy al builder ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name builder.muito.work;

    # Mismas rutas certbot que el resto del stack mwt.
    ssl_certificate     /etc/letsencrypt/live/builder.muito.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/builder.muito.work/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;

    location / {
        # Opción A — host.docker.internal (default)
        proxy_pass http://host.docker.internal:8080;
        # Opción B — red docker compartida
        # proxy_pass http://mwt-builder-nginx:80;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
