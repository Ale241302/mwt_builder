services:
  db:
    image: postgres:16-alpine
    container_name: mwt-builder-postgres
    volumes:
      - mwt_builder_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - mwt_builder_network

  django:
    build:
      context: ./backend
    image: mwt-builder/django:latest
    container_name: mwt-builder-django
    volumes:
      - mwt_builder_static:/app/static_collected
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=builder.muito.work,django,187.77.218.102,localhost
      - CSRF_TRUSTED_ORIGINS=https://builder.muito.work
    depends_on:
      - db
    networks:
      - mwt_builder_network

  frontend:
    build:
      context: ./frontend
    image: mwt-builder/frontend:latest
    container_name: mwt-builder-frontend
    networks:
      - mwt_builder_network

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
      args:
        # El Dockerfile compila el frontend con esta URL hardcoded en el bundle.
        VITE_API_URL: ${VITE_API_URL}
    image: mwt-builder/nginx:latest
    container_name: mwt-builder-nginx
    ports:
      # Bind a la IP del bridge docker default para que mwt-nginx (otro stack)
      # pueda llegar vía host.docker.internal:8080. Sigue NO siendo accesible
      # desde internet (172.17.0.1 es IP privada del bridge).
      - "172.17.0.1:8080:80"
    volumes:
      - mwt_builder_static:/app/static_collected
    depends_on:
      - django
      - frontend
    networks:
      - mwt_builder_network

networks:
  mwt_builder_network:
    driver: bridge

volumes:
  mwt_builder_postgres_data:
  mwt_builder_static:
