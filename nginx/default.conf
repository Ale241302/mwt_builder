upstream backend {
    server django:8000;
}

# SSL termina en el reverse-proxy externo (mwt-nginx en /opt/mwt).
# Este nginx solo escucha HTTP en :80 y solo es accesible vía 127.0.0.1:8080.
server {
    listen 80;
    server_name builder.muito.work _;

    # Tamaños generosos para uploads del builder (archivos JSON, imágenes en artefactos)
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Confiar en X-Forwarded-Proto del reverse-proxy externo
    set $forwarded_scheme $scheme;
    if ($http_x_forwarded_proto = 'https') {
        set $forwarded_scheme https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/static_collected/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Healthcheck simple para el reverse proxy
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
